<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ボタン確認</title>
  <style>
    body { font-family: sans-serif; padding: 24px; }
    .btn {
      padding: 12px 18px;
      border: none;
      border-radius: 999px;
      background: #0d6b73;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      align-items: center;
      justify-content: center;
    }
    .modal.show { display: flex; }
    .panel {
      background: #fff;
      padding: 24px;
      border-radius: 16px;
      min-width: 320px;
    }
  </style>
</head>
<body>
  <button id="createButton" class="btn" type="button">新規研修会登録</button>

  <div id="eventDialog" class="modal">
    <div class="panel">
      <h3>モーダルが開きました</h3>
      <button id="closeButton" type="button">閉じる</button>
    </div>
  </div>

  <script>
    function init() {
      const createButton = document.getElementById('createButton');
      const eventDialog = document.getElementById('eventDialog');
      const closeButton = document.getElementById('closeButton');

      createButton.addEventListener('click', function () {
        alert('クリック検知');
        eventDialog.classList.add('show');
      });

      closeButton.addEventListener('click', function () {
        eventDialog.classList.remove('show');
      });

      eventDialog.addEventListener('click', function (e) {
        if (e.target === eventDialog) {
          eventDialog.classList.remove('show');
        }
      });
    }

    init();
  </script>
</body>
</html>
