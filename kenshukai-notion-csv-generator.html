<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>事前申込者一覧 加工ツール（ブラウザ版）</title>
  <!-- SheetJS (xlsx) CDN -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #fff;
      border-radius: 8px;
      padding: 24px 32px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 20px;
      margin-bottom: 8px;
    }
    p.description {
      color: #555;
      font-size: 14px;
      margin-top: 0;
    }
    .form-row {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
    }
    input[type="text"],
    input[type="file"] {
      width: 100%;
      max-width: 300px;
      padding: 6px 8px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      background-color: #0078d4;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }
    button:disabled {
      background-color: #999;
      cursor: not-allowed;
    }
    .status {
      margin-top: 12px;
      font-size: 13px;
      color: #333;
      white-space: pre-line;
    }
    .note {
      margin-top: 24px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>事前申込者一覧 加工ツール（ブラウザ版）</h1>
    <p class="description">
      Excel の「事前申込者一覧.xlsx」をアップロードして、承認済みの登録者を抽出し、表記ゆれ修正・氏名列の作成などをブラウザ上で行います。
    </p>

    <div class="form-row">
      <label for="dateInput">開催日（例：250401）</label>
      <input id="dateInput" type="text" placeholder="250401">
    </div>

    <div class="form-row">
      <label for="fileInput">事前申込者一覧.xlsx</label>
      <input id="fileInput" type="file" accept=".xlsx,.xls">
    </div>

    <div class="form-row">
      <button id="runButton">実行してダウンロード</button>
    </div>

    <div id="status" class="status"></div>

    <div class="note">
      ※実際の UiPath ワークフローと同じルール（承認ステータスでの抽出、表記ゆれ修正、氏名列の作成など）を JavaScript で再現しています。<br>
      ※ネットワークフォルダは参照できないため、ファイルは手動でアップロードしてください。
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const dateInput = document.getElementById('dateInput');
    const runButton = document.getElementById('runButton');
    const statusEl = document.getElementById('status');

    function setStatus(message) {
      statusEl.textContent = message;
    }

    runButton.addEventListener('click', async () => {
      const file = fileInput.files[0];
      const dateStr = (dateInput.value || '').trim();

      if (!file) {
        alert('Excel ファイルを選択してください。');
        return;
      }

      if (!dateStr) {
        if (!confirm('開催日が未入力です。本当に続行しますか？')) {
          return;
        }
      }

      runButton.disabled = true;
      setStatus('Excel ファイルを読み込み中...');

      try {
        const arrayBuffer = await file.arrayBuffer();
        const workbook = XLSX.read(arrayBuffer, { type: 'array' });

        // シート名は「事前申込者一覧」を想定
        const sheetName = workbook.SheetNames.find(n => n === '事前申込者一覧') || workbook.SheetNames[0];
        const sheet = workbook.Sheets[sheetName];

        // シートを JSON 配列に変換（ヘッダあり）
        let data = XLSX.utils.sheet_to_json(sheet, { defval: '' });

        // 1〜5行を削除（ヘッダを含まない前提で、必要なら調整）
        // UiPath 側では Excel 上の 1〜5行目を削除していたので、それに対応。
        data = data.slice(5);

        // 承認ステータス == "承認済み" だけ残す（列名は実際のヘッダに合わせて変更）
        data = data.filter(row => row['承認ステータス'] === '承認済み');

        // 表記ゆれ修正（ご所属施設：H列相当）
        const facilityKey = 'ご所属施設'; // 実際のヘッダ名に合わせてください
        const facilityReplaceMap = {
          '静岡県立静岡がんセンター': '静岡がんセンター',
          '静岡県⽴静岡がんセンター': '静岡がんセンター',
          '静岡県静岡がんセンター': '静岡がんセンター',
          '静岡県立がんセンター': '静岡がんセンター',
          'scc': '静岡がんセンター'
        };

        // 部署（I列相当）
        const deptKey = '部署'; // 実際のヘッダ名に合わせてください
        const deptReplaceMap = {
          '臨床研究支援センター　臨床研究管理・調整室': '臨床研究管理・調整室',
          '臨床研究管理調整室': '臨床研究管理・調整室'
        };

        data = data.map(row => {
          // 所属施設の表記ゆれ
          if (row[facilityKey]) {
            let v = String(row[facilityKey]).trim();
            if (facilityReplaceMap[v] !== undefined) {
              v = facilityReplaceMap[v];
            }
            // 最後に「静岡がんセンター」→「静岡県立静岡がんセンター」に統一
            if (v === '静岡がんセンター') {
              v = '静岡県立静岡がんセンター';
            }
            row[facilityKey] = v;
          }

          // 部署の表記ゆれ
          if (row[deptKey]) {
            let v = String(row[deptKey]).trim();
            if (deptReplaceMap[v] !== undefined) {
              v = deptReplaceMap[v];
            }
            // 必要に応じてここに追加
            row[deptKey] = v;
          }

          return row;
        });

        // 列「氏名」「#」を追加
        // 既に列がある場合は上書き、ない場合は追加のイメージ
        data = data.map((row, index) => {
          const sei = String(row['姓'] || '').trim();
          const mei = String(row['名'] || '').trim();
          row['姓'] = sei;
          row['名'] = mei;
          row['氏名'] = sei && mei ? `${sei} ${mei}` : (sei || mei);
          row['#'] = index + 1; // 1,2,3,... を付与
          return row;
        });

        setStatus('Excel データを加工完了。ファイルを作成中...');

        // JSON 配列からシートに戻す
        const newSheet = XLSX.utils.json_to_sheet(data);

        // 新しいブックを作成してシートを追加
        const newWb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(newWb, newSheet, sheetName);

        // ダウンロード用にバイナリへ
        const wbout = XLSX.write(newWb, { bookType: 'xlsx', type: 'array' });
        const blob = new Blob([wbout], {
          type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
        });

        // ダウンロードリンクを自動クリック
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const dateSuffix = dateStr || 'no_date';
        a.href = url;
        a.download = `事前申込者一覧_加工_${dateSuffix}.xlsx`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);

        setStatus('完了しました。ダウンロードが開始されました。');

      } catch (e) {
        console.error(e);
        setStatus('エラーが発生しました。コンソールを確認してください。');
        alert('処理中にエラーが発生しました。');
      } finally {
        runButton.disabled = false;
      }
    });
  </script>
</body>
</html>
